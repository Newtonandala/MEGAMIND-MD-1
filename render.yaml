services:
  - type: web
    name: megamind-md
    env: node
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: BOT_NAME
        value: MEGAMIND-MD
      - key: BOT_MODE
        value: public
      - key: PREFIX
        value: "."
      - key: LOG_LEVEL
        value: info
      - key: PORT
        generateValue: false
        value: "3000"
      - key: OWNER_NUMBER
        sync: false
      - key: OWNER_NAME
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
    disk:
      name: megamind-session
      mountPath: /app/session
      sizeGB: 1
